<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Birthday Surprise</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="shell">
    <header class="top">
        <div class="badge">🎁 Surprise</div>
        <h1 class="title">Happy Birthday</h1>
        <p class="subtitle">Chạm để mở từng bất ngờ…</p>
    </header>

    <section class="card">
        <div id="stage" class="stage" aria-live="polite"></div>

        <div class="controls">
            <button id="btnPrimary" class="btn primary">Bắt đầu</button>
            <button id="btnReplay" class="btn" hidden>Chơi lại</button>
        </div>

        <!-- media ẩn: JS sẽ bật theo bước -->
        <audio id="bgm" preload="auto" src="assets/music.mp3"></audio>
    </section>

    <footer class="foot">
        <small>Made with Node.js + Vanilla JS</small>
    </footer>
</main>

<canvas id="fx" class="fx" aria-hidden="true"></canvas>
<script src="app.js"></script>
</body>
</html>
