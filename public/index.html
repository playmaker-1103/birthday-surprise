<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Birthday Reveal</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="shell">
    <header class="top">
        <h1 class="title">Happy Birthday</h1>
        <p class="subtitle">Yvonne</p>
    </header>

    <section class="card">
        <div class="progressWrap">
            <div id="progressText" class="progressText">Bước 0/5</div>
            <div class="bar"><div id="barFill" class="barFill"></div></div>
            <div id="subProgressText" class="subProgressText"></div>
        </div>

        <div id="stage" class="stage" aria-live="polite"></div>

        <div class="controls">
            <button id="btnPrimary" class="btn primary">Bắt đầu</button>
            <button id="btnReplay" class="btn" hidden>Chơi lại</button>
        </div>

        <audio id="bgm" preload="auto" src="assets/music.mp3"></audio>
    </section>

    <footer class="foot">
        <small>Anh Đạt siêu đẹp trai của em</small>
    </footer>
</main>

<canvas id="fx" class="fx" aria-hidden="true"></canvas>
<script src="app.js"></script>
</body>
</html>
